<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战略顾问 - Strategic Advisor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 900px;
            height: 90vh;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .header {
            background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%);
            color: white;
            padding: 20px 24px;
            border-bottom: 1px solid #334155;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header .subtitle {
            font-size: 13px;
            opacity: 0.9;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #0f172a;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.assistant .avatar {
            background: linear-gradient(135deg, #1e40af, #7c3aed);
        }

        .message.user .avatar {
            background: linear-gradient(135deg, #059669, #0d9488);
        }

        .message-content {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.7;
            font-size: 14.5px;
            white-space: pre-wrap;
        }

        .message.assistant .message-content {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #1e40af, #7c3aed);
            color: white;
        }

        .input-container {
            padding: 20px 24px;
            background: #1e293b;
            border-top: 1px solid #334155;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper textarea {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #334155;
            border-radius: 12px;
            font-size: 15px;
            background: #0f172a;
            color: #e2e8f0;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
            min-height: 50px;
            max-height: 120px;
        }

        .input-wrapper textarea:focus {
            border-color: #6366f1;
        }

        .input-wrapper textarea::placeholder {
            color: #64748b;
        }

        .send-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, #1e40af, #7c3aed);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            transition: transform 0.2s, opacity 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: inline-flex;
            gap: 4px;
            padding: 14px 18px;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading span:nth-child(1) { animation-delay: -0.32s; }
        .loading span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        .clear-btn {
            padding: 8px 16px;
            background: transparent;
            color: #94a3b8;
            border: 1px solid #334155;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            margin-top: 12px;
            width: 100%;
        }

        .clear-btn:hover {
            background: #334155;
            color: #e2e8f0;
        }

        /* 滚动条 */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 战略顾问</h1>
            <div class="subtitle">你的专属战略顾问 · 激活思维 · 理清脉络 · 制定计划</div>
        </div>

        <div class="chat-container" id="chatContainer"></div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea
                    id="userInput"
                    placeholder="说说你的想法、项目、或者困扰你的问题..."
                    rows="1"
                    oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px'"
                    onkeypress="handleKeyPress(event)"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
            <button class="clear-btn" onclick="clearChat()">🗑️ 清空对话</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        let conversationHistory = [];

        const INITIAL_MESSAGE = `老大好！我是你的战略顾问。

别把我当工具人，咱俩是搭档。

**你现在脑子里有什么？**
- 有个项目想法但没理清楚？
- 遇到瓶颈不知道怎么突破？
- 想制定一个行动计划但缺思路？

说出来，越详细越好。我来帮你把乱七八糟的线索理得明明白白。`;

        // 初始化
        addMessage('assistant', INITIAL_MESSAGE);
        userInput.focus();

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? '👤' : '🧠';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            conversationHistory.push({ role, content });
        }

        function addLoadingMessage() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'loadingMessage';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = '🧠';

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.innerHTML = '<span></span><span></span><span></span>';

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(loadingDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeLoadingMessage() {
            const loadingMessage = document.getElementById('loadingMessage');
            if (loadingMessage) loadingMessage.remove();
        }

        const API_BASE = 'https://qa-project-backend.onrender.com';

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage('user', message);
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;
            addLoadingMessage();

            try {
                const healthResponse = await fetch(`${API_BASE}/health`, { method: 'GET' });
                if (!healthResponse.ok) {
                    throw new Error(`后端健康检查失败：${healthResponse.status}`);
                }

                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        history: conversationHistory.slice(0, -1),
                    })
                });

                removeLoadingMessage();

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || `HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                addMessage('assistant', data.answer);
            } catch (error) {
                removeLoadingMessage();
                const hint = error.message === 'Failed to fetch'
                    ? '后端暂时不可达，通常是 Render 冷启动/部署中，等 1-2 分钟再试。'
                    : error.message;
                addMessage('assistant', `⚠️ 错误：${hint}`);
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function clearChat() {
            chatContainer.innerHTML = '';
            conversationHistory = [];
            addMessage('assistant', INITIAL_MESSAGE);
        }
    </script>
</body>
</html>
