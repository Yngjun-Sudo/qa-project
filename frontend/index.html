<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Project - AI 问答</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 800px;
            height: 80vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .mode-toggle {
            display: flex;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            overflow: hidden;
        }

        .mode-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
        }

        .mode-btn.active {
            background: rgba(255,255,255,0.3);
            font-weight: bold;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .input-container input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-container input:focus {
            border-color: #667eea;
        }

        .input-container button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .input-container button:hover {
            transform: scale(1.05);
        }

        .input-container button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .clear-btn {
            padding: 6px 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        .status-bar {
            padding: 8px 20px;
            background: #e8f5e9;
            font-size: 12px;
            color: #2e7d32;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-bar.advisor {
            background: #fff3e0;
            color: #e65100;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>🤖 QA Project</h1>
                <p id="modeLabel">AI 智能问答系统</p>
            </div>
            <div class="mode-toggle">
                <button class="mode-btn active" id="btnQA" onclick="switchMode('qa')">问答模式</button>
                <button class="mode-btn" id="btnAdvisor" onclick="switchMode('advisor')">战略顾问</button>
            </div>
        </div>

        <div class="status-bar" id="statusBar">
            <span id="statusText">💬 问答模式：你提问，AI 回答</span>
            <button class="clear-btn" onclick="clearChat()">清空对话</button>
        </div>

        <div class="chat-container" id="chatContainer"></div>

        <div class="input-container">
            <input
                type="text"
                id="userInput"
                placeholder="输入你的问题..."
                onkeypress="if(event.key==='Enter') sendMessage()"
            />
            <button onclick="sendMessage()" id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusText = document.getElementById('statusText');
        const statusBar = document.getElementById('statusBar');

        let currentMode = 'qa';
        let conversationHistory = [];

        const INITIAL_MESSAGES = {
            qa: '你好！我是 QA Project 助手，有什么可以帮你的吗？',
            advisor: '老大好！我是你的战略顾问。别把我当工具人，咱俩是搭档。\n\n你现在脑子里有什么想法、项目、或者乱七八糟的线索？都说出来，越详细越好，我来帮你理得明明白白。'
        };

        // 初始化
        addMessage('assistant', INITIAL_MESSAGES[currentMode]);
        userInput.focus();

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btnQA').classList.toggle('active', mode === 'qa');
            document.getElementById('btnAdvisor').classList.toggle('active', mode === 'advisor');

            if (mode === 'qa') {
                statusText.textContent = '💬 问答模式：你提问，AI 回答';
                statusBar.className = 'status-bar';
                userInput.placeholder = '输入你的问题...';
            } else {
                statusText.textContent = '🧠 战略顾问模式：AI 主动提问，帮你理清思路';
                statusBar.className = 'status-bar advisor';
                userInput.placeholder = '说说你的想法，越详细越好...';
            }

            clearChat();
        }

        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            conversationHistory.push({ role, content });
        }

        function addLoadingMessage() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'loadingMessage';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<span class="loading">正在思考中...</span>';

            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeLoadingMessage() {
            const loadingMessage = document.getElementById('loadingMessage');
            if (loadingMessage) {
                loadingMessage.remove();
            }
        }

        async function sendMessage() {
            const question = userInput.value.trim();
            if (!question) return;

            addMessage('user', question);
            userInput.value = '';
            sendBtn.disabled = true;
            addLoadingMessage();

            try {
                const response = await fetch('https://qa-project-backend.onrender.com/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: question,
                        history: conversationHistory.slice(0, -1),
                        mode: currentMode,
                    })
                });

                removeLoadingMessage();

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || `HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                addMessage('assistant', data.answer);
            } catch (error) {
                removeLoadingMessage();
                addMessage('assistant', `错误：${error.message}`);
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function clearChat() {
            chatContainer.innerHTML = '';
            conversationHistory = [];
            addMessage('assistant', INITIAL_MESSAGES[currentMode]);
        }
    </script>
</body>
</html>
